{% extends "base.html" %}

{% block title %}管理员登录{% endblock %}

{% block content %}
<div style="max-width:420px;margin:5rem auto;">
  <div class="card" style="text-align:center;">
    <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:1.2rem;">🔐 管理员登录</h2>
    <p class="text-gray text-sm" style="margin-bottom:1rem;">请将以下验证码发送给管理员 Bot 进行验证</p>
    <div style="font-size:2.5rem;font-weight:800;letter-spacing:0.3rem;color:#2d3748;padding:1rem;background:#f7fafc;border-radius:8px;margin-bottom:1rem;">
      {{ otp_code }}
    </div>
    <p class="text-sm text-gray">验证码有效期 5 分钟，请勿分享给他人。</p>
    <div id="status-msg" style="margin-top:1.2rem;min-height:2rem;" class="text-sm"></div>
    <div id="spinner" style="margin-top:0.5rem;color:#4299e1;font-size:0.85rem;">⏳ 等待验证中…</div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const BROWSER_TOKEN = "{{ browser_token }}";
  const POLL_INTERVAL = {{ poll_interval }} * 1000;

  async function poll() {
    try {
      const res = await fetch(`/admin/login/poll?token=${encodeURIComponent(BROWSER_TOKEN)}`);
      const data = await res.json();
      if (data.status === "verified") {
        document.getElementById("status-msg").innerHTML =
          '<span style="color:#38a169;font-weight:600;">✅ 验证成功，正在跳转…</span>';
        document.getElementById("spinner").style.display = "none";
        setTimeout(() => { window.location.href = data.redirect || "/admin/dashboard"; }, 800);
        return;
      } else if (data.status === "expired" || data.status === "not_found") {
        document.getElementById("status-msg").innerHTML =
          '<span style="color:#e53e3e;">验证码已过期，请<a href="/admin/login">刷新页面</a>重新获取。</span>';
        document.getElementById("spinner").style.display = "none";
        return;
      }
    } catch (e) {
      // network error, retry
    }
    setTimeout(poll, POLL_INTERVAL);
  }

  poll();
</script>
{% endblock %}
