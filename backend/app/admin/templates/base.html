<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}报告管理后台{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fa; color: #1a202c; min-height: 100vh; }
    .navbar { background: #2d3748; color: #fff; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .navbar a { color: #e2e8f0; text-decoration: none; margin-left: 1.2rem; font-size: 0.95rem; }
    .navbar a:hover { color: #fff; }
    .navbar .brand { font-size: 1.1rem; font-weight: 700; color: #fff; margin-left: 0; }
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
    .btn { display: inline-block; padding: 0.45rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; text-decoration: none; }
    .btn-primary { background: #4299e1; color: #fff; }
    .btn-primary:hover { background: #3182ce; }
    .btn-danger { background: #e53e3e; color: #fff; }
    .btn-danger:hover { background: #c53030; }
    .btn-secondary { background: #718096; color: #fff; }
    .btn-secondary:hover { background: #4a5568; }
    .btn-success { background: #38a169; color: #fff; }
    .btn-success:hover { background: #2f855a; }
    .table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .table th, .table td { padding: 0.65rem 0.9rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
    .table th { background: #f7fafc; font-weight: 600; color: #4a5568; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.78rem; font-weight: 600; }
    .badge-pending { background: #ebf8ff; color: #2b6cb0; }
    .badge-approved { background: #f0fff4; color: #276749; }
    .badge-rejected { background: #fff5f5; color: #c53030; }
    .badge-need_more_info { background: #fffaf0; color: #c05621; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: #4a5568; }
    .form-control { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 0.9rem; }
    .form-control:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,.15); }
    .alert { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
    .alert-error { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
    .alert-success { background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 0.5rem; }
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-4 { margin-top: 1rem; }
    .text-sm { font-size: 0.85rem; }
    .text-gray { color: #718096; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% if user is defined and user %}
  <nav class="navbar">
    <div class="flex items-center gap-2">
      <a href="/admin/dashboard" class="brand">📋 报告后台</a>
      <a href="/admin/dashboard">仪表盘</a>
      <a href="/admin/templates">模板管理</a>
    </div>
    <div>
      <a href="/admin/logout">退出登录</a>
    </div>
  </nav>
  {% endif %}
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
